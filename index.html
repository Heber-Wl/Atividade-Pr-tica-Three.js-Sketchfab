<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Prática - Three.js + Sketchfab</title>
    <style>
        /* Reset de margens e configuração para canvas em tela cheia */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        /* Elemento de feedback de carregamento assíncrono */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
    </style>

    <!-- Import Map para gerenciamento modular das dependências via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loading">Carregando modelo 3D...</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- VARIÁVEIS GLOBAIS DO ESCOPO DO MÓDULO ---
        let scene, camera, renderer, controls;
        const modelPath = './modelos/modelo.glb';

        /**
         * Inicializa os componentes principais do ambiente 3D
         */
        function init() {
            // 1. Instanciação da Cena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x232326); 

            // 2. Configuração da Câmera Perspectiva
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10); 

            // 3. Inicialização e Configuração do Renderizador WebGL
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            renderer.shadowMap.enabled = true; 
            
            // Gerenciamento de Cores e Mapeamento de Tons (Padrão sRGB/ACES)
            renderer.outputColorSpace = THREE.SRGBColorSpace; 
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 5.0; 

            document.body.appendChild(renderer.domElement);

            // 4. Ativação dos Subsistemas do Projeto
            setupLights();
            setupControls();
            loadModel();
            
            // Registro do Event Listener para Redimensionamento Responsivo
            window.addEventListener('resize', onWindowResize);
        }

        /**
         * Configura o sistema de iluminação (Ambiente + Direcionais)
         */
        function setupLights() {
            // Luz Ambiente para preenchimento geral de sombras
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);

            // Luz Direcional Primária (Geradora de sombras)
            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 2.5); 
            directionalLight1.position.set(5, 10, 7);
            directionalLight1.castShadow = true;
            scene.add(directionalLight1);

            // Luz Direcional Secundária (Preenchimento de contra-luz)
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight2.position.set(-5, 5, -7);
            scene.add(directionalLight2);
        }

        /**
         * Inicializa o mapeamento de interações periféricas (Mouse/Touch)
         */
        function setupControls() {
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.maxDistance = 50;     
            controls.minDistance = 2;      
        }

        /**
         * Executa a requisição assíncrona e tratamento do modelo GLTF/GLB
         */
        function loadModel() {
            const loader = new GLTFLoader();
            const loadingElement = document.getElementById('loading');

            loader.load(
                modelPath,
                (gltf) => {
                    const model = gltf.scene;
                    
                    // Cálculo da caixa delimitadora para centralização geométrica automática
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    
                    model.position.x += (model.position.x - center.x);
                    model.position.y += (model.position.y - center.y);
                    model.position.z += (model.position.z - center.z);
                    
                    // Varredura da árvore de nós para habilitação de projeção de sombras nas malhas
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    scene.add(model);
                    
                    // Transição suave para ocultar a interface de carregamento
                    loadingElement.style.opacity = 0;
                    setTimeout(() => loadingElement.remove(), 500);
                },
                (xhr) => {
                    console.log(`${(xhr.loaded / xhr.total * 100).toFixed(2)}% carregado`);
                },
                (error) => {
                    console.error('Erro na requisição analítica do modelo GLTF:', error);
                    loadingElement.innerText = 'Erro ao carregar o modelo. Verifique o console.';
                }
            );
        }

        /**
         * Handler encarregado de reajustar a matriz de projeção da câmera (Responsividade)
         */
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        /**
         * Ciclo de atualização contínua da cena (Render Loop)
         */
        function animate() {
            requestAnimationFrame(animate);

            // Atualização obrigatória para suavização (damping) dos controles
            if (controls) controls.update(); 

            // Renderização do frame atualizado
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        // --- EXECUÇÃO DO PROGRAMA ---
        init();
        animate();
    </script>
</body>
</html>
